<ion-content class="[&::part(background)]:bg-none" style="--background: var(--app-bg-gradient);">
  <div class="flex flex-col items-center justify-center min-h-full px-8 gap-8">

    <div class="text-center">
      <h1 class="text-2xl font-extrabold tracking-tight mb-1" style="color: var(--app-text);">Control de Inventario</h1>
      <p class="text-xs font-bold tracking-widest uppercase" style="background: linear-gradient(90deg, #EA580C, #F97316, #FBBF24); -webkit-background-clip: text; background-clip: text; color: transparent;">Sodimac</p>
    </div>

    <div class="w-full flex flex-col items-center gap-4">
      <p class="text-base font-medium" style="color: var(--app-text-secondary);">
        Descargando datos para trabajar…
      </p>

      <ion-progress-bar
        [value]="progress() / 100"
        color="primary"
        style="width: 100%; height: 8px; border-radius: 4px;"
      ></ion-progress-bar>

      <p class="text-sm font-semibold tabular-nums" style="color: var(--app-text-muted);">
        {{ progress() | number:'1.0-0' }}%
      </p>
    </div>

  </div>
</ion-content>
