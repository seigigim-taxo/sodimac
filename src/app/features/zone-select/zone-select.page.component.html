<ion-header>
  <ion-toolbar class="bg-[var(--app-surface)] border-b border-[var(--app-border)]">
    <ion-buttons slot="start">
      <ion-menu-button class="text-[var(--app-text)]"></ion-menu-button>
    </ion-buttons>
    <ion-title class="text-[var(--app-text)] font-bold text-lg">Zona de conteo</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="goBack()" class="text-[var(--app-text)]">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding [&amp;::part(background)]:bg-none" style="--background: var(--app-bg-gradient);">
  <div class="page-inner py-6">

    <!-- Header info -->
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-xl font-bold" style="color: var(--app-text);">Sucursal Providencia</h2>
      <div class="session-badge">
        <div class="session-badge-icon"></div>
        <span>Sesión activa</span>
      </div>
    </div>

    <!-- Scanner component -->
    <app-scan scanType="tag" placeholder="Escanea o ingresa TAG" confirmLabel="Confirmar TAG"
      (scan)="onTagScan($event)" (tagReset)="onTagReset()"></app-scan>

    <!-- Zone selection (shown after tag confirmed) -->
    @if (tagConfirmed()) {
    <div class="flex flex-col gap-3 mt-6">
      <h3 class="text-base font-bold" style="color: var(--app-text);">Selecciona una zona</h3>
      <ion-select #zoneSelect placeholder="Seleccionar zona" interface="action-sheet" (ionChange)="onZoneChange($event)"
        class="zone-select" [value]="selectedZone()?.id">
        @for (zone of zones; track zone.id) {
        <ion-select-option [value]="zone.id">
          {{ zone.name }}
        </ion-select-option>
        }
      </ion-select>
    </div>

    <ion-button expand="block" class="btn-primary" [disabled]="!selectedZone()" (click)="continue()">
      Continuar
    </ion-button>
    }
  </div>
</ion-content>
