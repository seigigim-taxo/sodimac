<div class="scan-container">
  <form [formGroup]="form" class="scan-form">
    <ion-input
      #scanInput
      formControlName="code"
      [placeholder]="placeholder()"
      [inputmode]="scanType() === 'sku' ? 'none' : 'text'"
      [autocapitalize]="scanType() === 'tag' ? 'characters' : 'none'"
      (ionFocus)="onInputFocus()"
      class="input-base"
    >
      <ion-icon slot="start" name="barcode-outline"></ion-icon>
    </ion-input>

    @if (scanType() === 'tag') {
      <ion-button
        expand="block"
        (click)="tagConfirmed() ? onChangeTag() : confirm()"
        [disabled]="form.invalid && !tagConfirmed()"
        class="btn-primary"
      >
        {{ tagConfirmed() ? 'Cambiar TAG' : confirmLabel() }}
      </ion-button>
    }
  </form>

  @if (scanType() === 'tag') {
    @if (tagConfirmed()) {
      <div class="status-banner status-banner-success">
        <span>✓ TAG: {{ tagValue() }}</span>
      </div>
    } @else {
      <div class="status-banner status-banner-info">
        <span>Escaneando tag para iniciar sesión de conteo</span>
      </div>
    }
  }
</div>
