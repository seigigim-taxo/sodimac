<div class="scan-container">
  <form [formGroup]="form" class="scan-form">
    <ion-input
      #scanInput
      formControlName="code"
      [placeholder]="placeholder()"
      (keyup.enter)="onEnter($event)"
      autofocus
      class="input-base"
    >
      <ion-icon slot="start" name="barcode-outline"></ion-icon>
    </ion-input>
    <ion-button
      expand="block"
      (click)="confirm()"
      [disabled]="form.invalid"
      class="btn-primary"
    >
      {{ confirmLabel() }}
    </ion-button>
  </form>

  @if (showBanner()) {
    @if (tagConfirmed()) {
      <div class="status-banner status-banner-success">
        <span>✓ {{ confirmedLabel() }}: {{ tagValue() }}</span>
      </div>
    } @else {
      <div class="status-banner status-banner-info">
        <span>{{ idleMessage() }}</span>
      </div>
    }
  }
</div>
